# ─────────────────────────────────────────────────────────────────────────────
# nginx snippet for py-screener
#
# Option A — dedicated subdomain (recommended)
#   Add this server block to your nginx config.
#   Replace screener.yourdomain.com with your actual domain.
#
# Option B — sub-path on an existing domain
#   See the location block variant at the bottom of this file.
#
# Basic auth is strongly recommended: the dashboard exposes portfolio data.
# Generate the password file with:
#   apt-get install apache2-utils   # or brew install httpd on macOS
#   htpasswd -c /etc/nginx/.htpasswd yourusername
# ─────────────────────────────────────────────────────────────────────────────

# ── Option A: dedicated subdomain ────────────────────────────────────────────
server {
    listen 80;
    server_name screener.yourdomain.com;

    # Redirect HTTP → HTTPS (remove if you're not using TLS yet)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name screener.yourdomain.com;

    # TLS — point at your cert/key (certbot, self-signed, etc.)
    ssl_certificate     /etc/nginx/ssl/screener.crt;
    ssl_certificate_key /etc/nginx/ssl/screener.key;

    # Basic auth (comment out if not needed)
    auth_basic           "py-screener";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://py-screener:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / long-poll headroom
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }
}


# ── Option B: sub-path on an existing domain ─────────────────────────────────
